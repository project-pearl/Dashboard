name: PIN Pipeline — Incremental Fetch

on:
  schedule:
    # Run every 6 hours at :15 past
    - cron: '15 */6 * * *'
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of states to fetch this run'
        required: false
        default: '4'
      start_date:
        description: 'Start date (YYYY-MM-DD)'
        required: false
        default: '2024-01-01'
      full_run:
        description: 'Run all states (ignores batch_size)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pin-pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pin-pipeline/requirements.txt

      - name: Health check (fast)
        run: python pin-pipeline/health.py --fast
        continue-on-error: true

      - name: Fetch data (incremental batch)
        if: ${{ !inputs.full_run }}
        run: |
          BATCH=${{ inputs.batch_size || '4' }}
          START=${{ inputs.start_date || '2024-01-01' }}
          python pin-pipeline/fetch.py --next-batch "$BATCH" --from "$START"

      - name: Fetch data (full run)
        if: ${{ inputs.full_run == true }}
        run: |
          START=${{ inputs.start_date || '2024-01-01' }}
          python pin-pipeline/fetch.py --all-states --from "$START"
        timeout-minutes: 30

      - name: Generate .ts output
        run: python pin-pipeline/output.py --target pin-pipeline/../lib/pin

      - name: Create PR with updated data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only stage actual data files — not registry.json timestamp churn
          git add pin-pipeline/output/ lib/pin/

          # Check if any real data changed
          if git diff --staged --quiet; then
            echo "No new data to commit — skipping PR"
            exit 0
          fi

          # Data changed — include registry.json too
          git add pin-pipeline/registry.json

          STATES=$(git diff --staged --name-only | grep -oP 'wqp-\K[A-Z]{2}' | sort -u | tr '\n' ',' | sed 's/,$//')
          BRANCH="chore/pin-update-$(date +%Y%m%d-%H%M)"
          git checkout -b "$BRANCH"
          git commit -m "chore(pin): incremental fetch — ${STATES:-batch update}

          Automated by PIN Pipeline GitHub Action
          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore(pin): incremental fetch — ${STATES:-batch update}" \
            --body "Automated PIN pipeline data update.

          **States updated:** ${STATES:-all batched}

          _Auto-generated by PIN Pipeline GitHub Action_"
